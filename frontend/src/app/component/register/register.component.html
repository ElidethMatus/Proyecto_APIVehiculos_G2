<h2>Registro</h2>

<input [(ngModel)]="usuario.Nombre" placeholder="Nombre">
<input [(ngModel)]="usuario.Apellido" placeholder="Apellido">
<input [(ngModel)]="usuario.Username" placeholder="Username">
<input [(ngModel)]="usuario.Correo" placeholder="Correo">
<input [(ngModel)]="usuario.Telefono" placeholder="Telefono">
<input [(ngModel)]="usuario.Password" type="password" placeholder="Password">

<button (click)="registrar()">Registrarse</button>
